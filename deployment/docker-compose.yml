version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-postgres
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research_password}
      POSTGRES_DB: research_ideas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d research_ideas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
